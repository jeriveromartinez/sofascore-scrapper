name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-smoke-test:
    runs-on:
      - iptv

    env:
      DB_HOST: 192.168.0.15
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ju1io
      DB_NAME: iptv
      API_ADDR: 0.0.0.0:9065

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download Go modules
        run: go mod download

      - name: Build Go binary
        run: |
          mkdir -p bin
          go build -v -o iptv .

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: web/yarn.lock

      - name: Install web dependencies
        working-directory: web
        run: yarn

      - name: Build Vue app
        working-directory: web
        run: yarn build

      - name: Ensure database exists
        run: |
          mysql \
            -h "$DB_HOST" \
            -P "$DB_PORT" \
            -u"$DB_USER" \
            -p"$DB_PASSWORD" \
            -e "CREATE DATABASE IF NOT EXISTS \`$DB_NAME\` CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"

      - name: Install backend and frontend artifacts on runner
        run: |
          sudo mkdir -p /opt/iptv/web
          sudo cp ./iptv /opt/iptv/iptv
          sudo rm -rf /opt/iptv/web/dist
          sudo cp -R ./web/dist /opt/iptv/web/dist
          sudo chmod +x /opt/iptv/iptv

      - name: Write service environment file
        run: |
          sudo mkdir -p /etc/iptv
          sudo tee /etc/iptv/iptv.env >/dev/null <<EOF
          DB_HOST=${DB_HOST}
          DB_PORT=${DB_PORT}
          DB_USER=${DB_USER}
          DB_PASSWORD=${DB_PASSWORD}
          DB_NAME=${DB_NAME}
          API_ADDR=${API_ADDR}
          EOF
          sudo chmod 600 /etc/iptv/iptv.env

      - name: Create or update systemd service
        run: |
          RUNNER_USER="$(id -un)"
          sudo tee /etc/systemd/system/iptv.service >/dev/null <<EOF
          [Unit]
          Description=IPTV Go API Service
          After=network.target

          [Service]
          Type=simple
          WorkingDirectory=/opt/iptv
          ExecStart=/opt/iptv/iptv
          EnvironmentFile=/etc/iptv/iptv.env
          Restart=always
          RestartSec=5
          User=${RUNNER_USER}

          [Install]
          WantedBy=multi-user.target
          EOF

      - name: Restart and enable systemd service
        run: |
          sudo systemctl daemon-reload
          sudo systemctl enable iptv
          sudo systemctl restart iptv
          sudo systemctl --no-pager --full status iptv
